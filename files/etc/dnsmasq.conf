# ============================================================
# dnsmasq ipset 配置 — 短视频平台自动分流
# ============================================================
# 原理：dnsmasq 解析平台域名时自动将 CDN IP 加入 ipset
# MWAN3 根据 ipset 将对应流量路由到指定 WAN 口
# 平台 CDN 换 IP 时自动更新，无需手动维护
# ============================================================

# --- 抖音 / 头条系 CDN (WAN1 - 电信) ---
ipset=/douyin.com/douyin_cdn
ipset=/douyinvod.com/douyin_cdn
ipset=/snssdk.com/douyin_cdn
ipset=/ixigua.com/douyin_cdn
ipset=/ixiguavideo.com/douyin_cdn
ipset=/toutiao.com/toutiao_cdn
ipset=/toutiaocdn.com/toutiao_cdn
ipset=/pstatp.com/toutiao_cdn
ipset=/byteimg.com/toutiao_cdn
ipset=/bytecdn.cn/toutiao_cdn

# --- B站 CDN (WAN2 - 联通) ---
ipset=/bilibili.com/bili_cdn
ipset=/bilivideo.com/bili_cdn
ipset=/hdslb.com/bili_cdn

# --- 小红书 CDN (WAN1 - 电信) ---
ipset=/xiaohongshu.com/xhs_cdn
ipset=/xhscdn.com/xhs_cdn

# --- 快手 CDN (WAN2 - 联通) ---
ipset=/kuaishou.com/kuaishou_cdn
ipset=/yximgs.com/kuaishou_cdn
ipset=/kspkg.com/kuaishou_cdn

# --- 微信视频号 CDN (WAN1 - 电信) ---
ipset=/weixin.qq.com/wxvideo_cdn
ipset=/wxqcloud.qq.com/wxvideo_cdn
ipset=/vweixinthumb.tc.qq.com/wxvideo_cdn
