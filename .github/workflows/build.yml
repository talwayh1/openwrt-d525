name: Build D525 OpenWrt

on:
  push:
    branches: [main, master]
  workflow_dispatch:
  schedule:
    - cron: '0 0 1 * *'

env:
  REPO_URL: https://github.com/coolsnowwolf/lede
  REPO_BRANCH: master
  FEEDS_CONF: feeds.conf.default
  CONFIG_FILE: .config
  DIY_P1_SH: diy-part1.sh
  DIY_P2_SH: diy-part2.sh
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        target: [generic]

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    # ──── ccache 缓存（编译加速核心）────
    - name: Restore ccache
      uses: actions/cache/restore@v4
      id: ccache-restore
      with:
        path: /tmp/ccache
        key: ccache-d525-${{ github.ref_name }}-${{ github.sha }}
        restore-keys: |
          ccache-d525-${{ github.ref_name }}-
          ccache-d525-

    - name: Restore download cache
      uses: actions/cache/restore@v4
      with:
        path: /workdir/openwrt/dl
        key: dl-d525-${{ hashFiles('feeds.conf.default') }}-${{ hashFiles('.config') }}
        restore-keys: |
          dl-d525-

    - name: Init build environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        # 预配 ccache
        if [ -d /tmp/ccache ]; then
          echo "ccache restored: $(du -sh /tmp/ccache | cut -f1)"
        fi
        mkdir -p /tmp/ccache
        
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
        sudo docker image prune --all --force || true
        sudo -E apt-get -qq update
        sudo -E apt-get -qq install -y ack antlr3 asciidoc autoconf automake autopoint binutils bison \
          build-essential bzip2 ccache cmake cpio curl device-tree-compiler fastjar flex gawk gettext \
          gcc-multilib g++-multilib git gperf haveged help2man intltool libc6-dev-i386 libelf-dev \
          libfuse-dev libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses5-dev \
          libncursesw5-dev libpython3-dev libreadline-dev libssl-dev libtool lrzsz mkisofs msmtp \
          ninja-build p7zip p7zip-full patch pkgconf python3 python3-pyelftools python3-setuptools \
          qemu-utils rsync scons squashfs-tools subversion swig texinfo uglifyjs upx-ucl unzip \
          vim wget xmlto xxd zlib1g-dev
        sudo -E apt-get -qq autoremove --purge
        sudo -E apt-get -qq clean
        sudo timedatectl set-timezone "$TZ"
        sudo mkdir -p /workdir
        sudo chown $USER:$GROUPS /workdir
        
        # ccache 配置
        ccache --set-config=cache_dir=/tmp/ccache
        ccache --set-config=max_size=5G
        ccache --set-config=compression=true
        ccache -z

    - name: Clone source
      working-directory: /workdir
      run: |
        df -hT $PWD
        git clone $REPO_URL -b $REPO_BRANCH --depth=1 openwrt
        ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt

    - name: Load custom feeds + pre-patches
      working-directory: /workdir/openwrt
      run: |
        [ -e $GITHUB_WORKSPACE/$FEEDS_CONF ] && cp $GITHUB_WORKSPACE/$FEEDS_CONF feeds.conf.default
        [ -f $GITHUB_WORKSPACE/$DIY_P1_SH ] && bash $GITHUB_WORKSPACE/$DIY_P1_SH

    - name: Setup git for third-party repos
      run: |
        git config --global url."https://oauth2:${{ secrets.GITHUB_TOKEN }}@github.com".insteadOf "https://github.com"
        git config --global --list | grep url

    - name: Update & install feeds
      working-directory: /workdir/openwrt
      run: |
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Apply config + post-feeds customization
      working-directory: /workdir/openwrt
      run: |
        [ -e $GITHUB_WORKSPACE/files ] && cp -a $GITHUB_WORKSPACE/files/* ./
        [ -e $GITHUB_WORKSPACE/$CONFIG_FILE ] && cp $GITHUB_WORKSPACE/$CONFIG_FILE .config
        [ -f $GITHUB_WORKSPACE/$DIY_P2_SH ] && bash $GITHUB_WORKSPACE/$DIY_P2_SH

    - name: Download + Prepare
      working-directory: /workdir/openwrt
      run: |
        make defconfig
        # 并行下载（网络比CPU快得多）
        make download -j16
        find dl -size -1024c -exec rm -f {} \;

    - name: Compile firmware
      id: compile
      working-directory: /workdir/openwrt
      run: |
        echo "ccache stats before:"
        ccache -s
        echo "Build threads: $(nproc)"
        # 首次构建: ccache miss → 2-4h; 二次构建: ccache hit → 15-30min
        make -j$(nproc) || make -j1 V=s
        echo "status=success" >> $GITHUB_OUTPUT
        echo "FILE_DATE=$(date +'%Y%m%d-%H%M')" >> $GITHUB_ENV
        echo "ccache stats after:"
        ccache -s

    # ──── 保存 cache ────
    - name: Save ccache
      if: always()
      uses: actions/cache/save@v4
      with:
        path: /tmp/ccache
        key: ccache-d525-${{ github.ref_name }}-${{ github.sha }}

    - name: Save download cache
      if: steps.compile.outputs.status == 'success'
      uses: actions/cache/save@v4
      with:
        path: /workdir/openwrt/dl
        key: dl-d525-${{ hashFiles('feeds.conf.default') }}-${{ hashFiles('.config') }}

    - name: Check space
      if: always()
      run: df -hT

    - name: Package firmware
      if: steps.compile.outputs.status == 'success'
      run: |
        cd /workdir/openwrt/bin/targets/*/*
        rm -rf packages
        ls -lh *.img.gz *.vmdk *.vdi *.vhdx 2>/dev/null || true
        echo "FIRMWARE_DIR=$PWD" >> $GITHUB_ENV

    - name: Upload firmware artifacts
      if: steps.compile.outputs.status == 'success'
      uses: actions/upload-artifact@v4
      with:
        name: OpenWrt-D525-x86_64-${{ env.FILE_DATE }}
        path: ${{ env.FIRMWARE_DIR }}
        retention-days: 90

    - name: Create release
      if: steps.compile.outputs.status == 'success'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ env.FILE_DATE }}
        name: OpenWrt D525 x86_64 — ${{ env.FILE_DATE }}
        body: |
          ## OpenWrt D525 定制固件 | 多宽带聚合

          **源码**: Lean's LEDE | **内核**: 6.12.x
          **适配**: Intel Atom D525 + 4口千兆 | **内存**: 1G/2G/4G

          ### 三层分流架构（对标爱快）
          | 层次 | 技术 | 功能 |
          |------|------|------|
          | 第1层 | dnsmasq ipset | 域名级精确WAN分配 |
          | 第2层 | OpenAppFilter DPI | 应用级自动识别分流 |
          | 第3层 | MWAN3 balanced | 未知流量双线负载 |

          ### 预装亮点
          - SSR-Plus / OpenClash / PassWall
          - OpenAppFilter (抖音/快手/B站/小红书 等100+APP识别)
          - Docker + 管理界面
          - 解锁网易云 / AdGuardHome / MWAN3 + 并发多拨
          - WireGuard / OpenVPN / TTYD / NetData

          ### 默认配置
          IP: 192.168.1.1 | root/password | 时区: Asia/Shanghai
        files: ${{ env.FIRMWARE_DIR }}/*
