name: Build D525 OpenWrt

on:
  push:
    branches: [main, master]
  workflow_dispatch:
  schedule:
    - cron: '0 0 1 * *'

env:
  # 使用 Lean's LEDE 作为源码（中国社区最流行）
  REPO_URL: https://github.com/coolsnowwolf/lede
  REPO_BRANCH: master
  FEEDS_CONF: feeds.conf.default
  CONFIG_FILE: .config
  DIY_P1_SH: diy-part1.sh
  DIY_P2_SH: diy-part2.sh
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        target: [generic]

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Init build environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        # 清理 GitHub Actions 自带的大文件释放空间
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
        sudo docker image prune --all --force || true
        sudo -E apt-get -qq update
        sudo -E apt-get -qq install -y ack antlr3 asciidoc autoconf automake autopoint binutils bison \
          build-essential bzip2 ccache cmake cpio curl device-tree-compiler fastjar flex gawk gettext \
          gcc-multilib g++-multilib git gperf haveged help2man intltool libc6-dev-i386 libelf-dev \
          libfuse-dev libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses5-dev \
          libncursesw5-dev libpython3-dev libreadline-dev libssl-dev libtool lrzsz mkisofs msmtp \
          ninja-build p7zip p7zip-full patch pkgconf python3 python3-pyelftools python3-setuptools \
          qemu-utils rsync scons squashfs-tools subversion swig texinfo uglifyjs upx-ucl unzip \
          vim wget xmlto xxd zlib1g-dev
        sudo -E apt-get -qq autoremove --purge
        sudo -E apt-get -qq clean
        sudo timedatectl set-timezone "$TZ"
        sudo mkdir -p /workdir
        sudo chown $USER:$GROUPS /workdir

    - name: Clone source
      working-directory: /workdir
      run: |
        df -hT $PWD
        git clone $REPO_URL -b $REPO_BRANCH openwrt
        ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt

    - name: Load custom feeds + pre-patches
      working-directory: /workdir/openwrt
      run: |
        # 替换 feeds 配置文件（加入中国社区源）
        [ -e $GITHUB_WORKSPACE/$FEEDS_CONF ] && cp $GITHUB_WORKSPACE/$FEEDS_CONF feeds.conf.default
        # 执行自定义脚本
        [ -f $GITHUB_WORKSPACE/$DIY_P1_SH ] && bash $GITHUB_WORKSPACE/$DIY_P1_SH

    - name: Update & install feeds
      working-directory: /workdir/openwrt
      run: |
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Apply config + post-feeds customization
      working-directory: /workdir/openwrt
      run: |
        # 合并自定义文件到 rootfs
        [ -e $GITHUB_WORKSPACE/files ] && cp -a $GITHUB_WORKSPACE/files/* ./
        # 复制 .config
        [ -e $GITHUB_WORKSPACE/$CONFIG_FILE ] && cp $GITHUB_WORKSPACE/$CONFIG_FILE .config
        # 执行 part2 脚本
        [ -f $GITHUB_WORKSPACE/$DIY_P2_SH ] && bash $GITHUB_WORKSPACE/$DIY_P2_SH

    - name: Download packages
      working-directory: /workdir/openwrt
      run: |
        make defconfig
        make download -j8
        # 清理下载失败的文件
        find dl -size -1024c -exec ls -l {} \;
        find dl -size -1024c -exec rm -f {} \;

    - name: Compile firmware
      id: compile
      working-directory: /workdir/openwrt
      run: |
        echo "Build threads: $(nproc)"
        make -j$(nproc) || make -j1 || make -j1 V=s
        echo "status=success" >> $GITHUB_OUTPUT
        echo "FILE_DATE=$(date +'%Y%m%d-%H%M')" >> $GITHUB_ENV

    - name: Check space
      if: always()
      run: df -hT

    - name: Package firmware
      if: steps.compile.outputs.status == 'success'
      run: |
        cd /workdir/openwrt/bin/targets/*/*
        rm -rf packages
        # 只保留关键文件
        ls -lh *.img.gz *.vmdk *.vdi *.vhdx 2>/dev/null || ls -lh
        echo "FIRMWARE_DIR=$PWD" >> $GITHUB_ENV

    - name: Upload firmware artifacts
      if: steps.compile.outputs.status == 'success'
      uses: actions/upload-artifact@v4
      with:
        name: OpenWrt-D525-x86_64-${{ env.FILE_DATE }}
        path: ${{ env.FIRMWARE_DIR }}
        retention-days: 90

    - name: Create release
      if: steps.compile.outputs.status == 'success'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ env.FILE_DATE }}
        name: OpenWrt D525 x86_64 — ${{ env.FILE_DATE }}
        body: |
          ## OpenWrt D525 定制固件

          - **源码**: Lean's LEDE (coolsnowwolf/lede)
          - **架构**: x86_64 generic
          - **适配**: Intel Atom D525 + 4口千兆
          - **内存**: 通用 1G/2G/4G
          - **文件系统**: SquashFS (推荐) + Ext4 + VMDK/VDI

          ### 预装插件
          - SSR-Plus / OpenClash / PassWall
          - Docker + 管理界面
          - 解锁网易云 / 阿里云盘 WebDAV
          - AdGuardHome / MWAN3 / DDNS
          - WireGuard / OpenVPN
          - NetData 监控 / TTYD 终端

          ### 默认配置
          - IP: 192.168.1.1 | 用户: root | 密码: password
          - 时区: Asia/Shanghai
          - 网口: eth0=WAN, eth1-3=LAN 桥接
        files: ${{ env.FIRMWARE_DIR }}/*
